id: default-credentials
info:
  name: Default / Weak Credentials Accepted
  author: karaxys
  severity: high
  description: The Scanner submits common default username/password pairs to the discovered authentication endpoint and checks for a successful login (2xx plus a session/JWT/auth token in the response). Accepting default credentials indicates weak account provisioning.
  tags: api, authentication, default-login, OWASP
  reference:
    - "https://owasp.org/www-project-api-security/"
    - "https://cwe.mitre.org/data/definitions/1392.html"
  classification:
    cwe-id:
      - CWE-1392
      - CWE-521

http:
  - raw:
      - |
        POST {{path}} HTTP/1.1
        Host: {{Hostname}}
        Content-Type: application/json
        User-Agent: Karaxys-Scanner/1.0

        {"username":"{{user}}","password":"{{pass}}"}
    payloads:
      user:
        - admin
        - administrator
        - root
        - test
        - user
      pass:
        - admin
        - password
        - admin123
        - "123456"
        - changeme
    attack: pitchfork
    stop-at-first-match: true

    matchers-condition: and
    matchers:
      - type: status
        name: vulnerable
        status:
          - 200

      - type: word
        part: body
        case-insensitive: true
        condition: or
        words:
          - "\"token\""
          - "\"access_token\""
          - "\"auth_token\""
          - "\"jwt\""
          - "\"session\""
