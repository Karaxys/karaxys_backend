services:
  mongo:
    image: mongo:7
    container_name: karaxys-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - karaxys_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

volumes:
  karaxys_mongo_data:
