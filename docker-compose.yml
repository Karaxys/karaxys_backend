services:
  mongo:
    image: mongo:7
    container_name: karaxys-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - karaxys_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  redis:
    image: valkey/valkey:8-alpine
    container_name: karaxys-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["valkey-server", "--appendonly", "yes"]
    volumes:
      - karaxys_valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  minio:
    image: minio/minio:latest
    container_name: karaxys-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: karaxys
      MINIO_ROOT_PASSWORD: karaxys-local-minio-password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - karaxys_minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: karaxys-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://127.0.0.1:19092
    ports:
      - "19092:19092"
      - "9644:9644"
    volumes:
      - karaxys_redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info -X brokers=localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  redpanda-init:
    image: redpandadata/redpanda:latest
    container_name: karaxys-redpanda-init
    depends_on:
      redpanda:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        rpk topic create karaxys.http.conversations --partitions 3 --replicas 1 -X brokers=redpanda:9092 || true;
        rpk topic create karaxys.analyzer.jobs --partitions 3 --replicas 1 -X brokers=redpanda:9092 || true;
        rpk topic create karaxys.ingest.dead_letter --partitions 3 --replicas 1 -X brokers=redpanda:9092 || true;
        rpk topic list -X brokers=redpanda:9092

volumes:
  karaxys_mongo_data:
  karaxys_valkey_data:
  karaxys_minio_data:
  karaxys_redpanda_data:
